buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath("org.springframework.boot:spring-boot-gradle-plugin:2.0.1.RELEASE")
    }
}

allprojects {
    apply plugin: 'idea'

}

subprojects {
    apply plugin: 'java'
    apply plugin: 'maven'
    apply plugin: 'io.spring.dependency-management'

    // === Repository config ===
    repositories {
        mavenCentral()
    }

    // === JAVA configuration ===
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8

    // === JAR Properties ===
    jar {
        manifest {
            attributes("Implementation-Title": name, "Implementation-Version": version)
        }
    }


    test {
        exclude '**/*IntegrationTest*'
    }

    task integrationTest(type: Test) {
        include '**/*IntegrationTest*'
        it.mustRunAfter test
    }
}

project(':module') {

    dependencies {
        compile 'org.springframework.boot:spring-boot-starter:2.0.1.RELEASE'
        testCompile 'org.springframework.boot:spring-boot-starter-test:2.0.1.RELEASE'
    }
}

project(':application') {
    apply plugin: 'org.springframework.boot'

    // === Dependencies ===
    dependencies {
        compile project(':module')

        compile 'org.springframework.boot:spring-boot-starter-web'
        compile 'org.springframework.boot:spring-boot-starter-data-jpa'
        compile 'org.springframework.boot:spring-boot-starter-actuator'

        compile 'com.h2database:h2:1.4.197'
        //testing
        testCompile 'org.springframework.boot:spring-boot-starter-test'
        testCompile 'com.h2database:h2'
    }

    // === Spring Boot Configuration ===
    bootJar {
        launchScript()
    }
}

// === Wrapper generation ===
task wrapper(type: Wrapper) {
    gradleVersion = '4.7'
    distributionType  = Wrapper.DistributionType.ALL
}
